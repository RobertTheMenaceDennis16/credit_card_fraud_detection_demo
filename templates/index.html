<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection Lab | Live Demo</title>
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            padding: 2rem;
            border-radius: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; font-weight: 800; letter-spacing: -1px; margin-bottom: 2rem; }

        /* Card Selection Grid */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .selectable-card {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, ring 0.2s;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid transparent;
        }

        .selectable-card:hover { transform: translateY(-5px); }

        .selectable-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        /* Mock Credit Card Styling */
        .cc-visual {
            height: 180px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, #334155 0%, #0f172a 100%);
        }

        .cc-visual.stolen { background: linear-gradient(135deg, #450a0a 0%, #0f172a 100%); }

        .chip { width: 40px; height: 30px; background: #fbbf24; border-radius: 4px; }
        .number { font-family: 'Courier New', monospace; font-size: 1.2rem; letter-spacing: 2px; }
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }
        .badge-clean { background: var(--success); }
        .badge-stolen { background: var(--danger); }

        /* Form Controls */
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #94a3b8; }
        select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.2s;
        }

        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div class="container">
    <h1>Credit Card Fraud Detection <span style="color: var(--primary)">Simulation</span></h1>

    <form action="/predict" method="post" id="fraudForm">
        <label>1. SELECT TEST SUBJECT</label>
        <div class="card-grid">
            <div class="selectable-card" onclick="selectCard('clean_card', this)">
                <span class="badge badge-clean">Verified User</span>
                <div class="cc-visual">
                    <div class="chip"></div>
                    <div class="number">**** **** **** 4421</div>
                    <div class="name">JONATHAN DOE</div>
                </div>
            </div>

            <div class="selectable-card" onclick="selectCard('stolen_card', this)">
                <span class="badge badge-stolen">High Risk</span>
                <div class="cc-visual stolen">
                    <div class="chip"></div>
                    <div class="number">**** **** **** 8809</div>
                    <div class="name">UNKNOWN ORIGIN</div>
                </div>
            </div>
        </div>

        <input type="hidden" name="card" id="cardInput" required>

        <label for="model">2. SELECT ML ARCHITECTURE</label>
        <select name="model" id="model">
            <option value="svm">Support Vector Machine (SVM)</option>
            <option value="random_forest">Random Forest Classifier</option>
            <option value="gradient_boost">XGBoost / Gradient Boosting</option>
            <option value="CS-SVM">Cuckoo Search - SVM </option>
        </select>

        <button type="submit">EXECUTE TRANSACTION ANALYSIS</button>
    </form>
</div>

<script>
    function selectCard(val, element) {
        // Update hidden input
        document.getElementById('cardInput').value = val;
        
        // Update UI styling
        const cards = document.querySelectorAll('.selectable-card');
        cards.forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
    }
</script>

</body>
</html>
